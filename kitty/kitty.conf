# Kitty terminal configuration

# Font
font_family JetBrainsMono Nerd Font
font_size 14.0
bold_font auto
italic_font auto
bold_italic_font auto
line_height 1.1

# Appearance
background #1e1e2e
foreground #cdd6f4
selection_background #45475a
selection_foreground #cdd6f4
cursor #f5e0dc
cursor_shape beam
background_opacity 1.0

# OS window and title bar
linux_display_server auto
hide_window_decorations no
remember_window_size no
initial_window_width 100c
initial_window_height 28c
placement_strategy center

# Catppuccin Mocha palette
color0 #1e1e2e
color1 #f38ba8
color2 #a6e3a1
color3 #f9e2af
color4 #89b4fa
color5 #cba6f7
color6 #94e2d5
color7 #bac2de
color8 #6c7086
color9 #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #cba6f7
color14 #94e2d5
color15 #a6adc8

# Spacing
window_padding_width 10
window_margin_width 8

# Tabs
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge bottom
tab_bar_min_tabs 1
tab_bar_background #181825
active_tab_background #89b4fa
active_tab_foreground #11111b
inactive_tab_background #313244
inactive_tab_foreground #bac2de
tab_fade 0.1
active_border_color #74c7ec
inactive_border_color #313244

# Title
window_border_width 2pt
wayland_titlebar_color background
x11_hide_window_decorations no

# Window accents
bell_border_color #f9e2af
draw_minimal_borders yes

# Behavior
scrollback_lines 30000
enable_audio_bell no
visual_bell no
confirm_os_window_close 0

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Tabs
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

# Splits
map ctrl+shift+o launch --location=vsplit --cwd=current
map ctrl+shift+e launch --location=hsplit --cwd=current

# Pane navigation
map alt+h neighboring_window left
map alt+j neighboring_window down
map alt+k neighboring_window up
map alt+l neighboring_window right

# Resize panes
map ctrl+alt+h resize_window narrower 6
map ctrl+alt+l resize_window wider 6
map ctrl+alt+j resize_window shorter 6
map ctrl+alt+k resize_window taller 6

# Close current pane/window
map ctrl+shift+x close_window
